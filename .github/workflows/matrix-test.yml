name: Multi-OS Test Suite

on: [push, pull_request]

jobs:
  build-and-test:
    # Sử dụng biến matrix để chọn hệ điều hành dynamically
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Định nghĩa ma trận các môi trường
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests with Maven
        # Nếu pom.xml nằm trong thư mục con 'y', thêm: working-directory: ./y
        run: mvn test